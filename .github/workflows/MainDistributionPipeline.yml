#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

# OIDC token needed for AWS credentials in the deploy job.
permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.3
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5.3
      extension_name: anofox_statistics
      enable_rust: true
      reduced_ci_mode: disabled

  duckdb-stable-deploy:
    name: Deploy extension binaries (v1.5.3)
    needs: duckdb-stable-build
    # Run the deploy step even when a non-essential build matrix entry
    # (currently windows_amd64 — DuckDB's vendored third_party/fmt is
    # flaky on MSVC) fails. The deploy job itself fans out per arch and
    # only pushes the artifacts that actually exist.
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.5.3
      extension_name: anofox_statistics
      exclude_archs: "windows_amd64;windows_amd64_mingw"
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  duckdb-v144-build:
    name: Build extension binaries (DuckDB v1.4.4)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.4
    with:
      duckdb_version: v1.4.4
      ci_tools_version: v1.4.4
      extension_name: anofox_statistics
      enable_rust: true
      reduced_ci_mode: disabled

  duckdb-v144-deploy:
    name: Deploy extension binaries (v1.4.4 LTS)
    needs: duckdb-v144-build
    # Same resilience as the v1.5.3 deploy: don't gate the whole release on
    # the flaky LTS windows_amd64_mingw matrix entry.
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.4.4
      extension_name: anofox_statistics
      exclude_archs: "windows_amd64;windows_amd64_mingw"
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  build-and-test-rust:
    name: Build and test Rust components
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Rust library
        run: cargo build --release

      - name: Run Rust tests
        run: cargo test --all-features
